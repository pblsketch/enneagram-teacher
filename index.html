<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교사 애니어그램 테스트</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#faf9f7;--card:#fff;--text:#2d2d2d;--sub:#6b6b6b;
  --accent:#5B6ABF;--accent2:#7B8AD6;--border:#e8e6e3;
  --shadow:0 2px 16px rgba(0,0,0,.06);
  --radius:16px;
  --type1:#6EC1E4;--type2:#E8A87C;--type3:#F6D55C;
  --type4:#9B59B6;--type5:#3498DB;--type6:#27AE60;
  --type7:#F39C12;--type8:#E74C3C;--type9:#1ABC9C;
}
body{font-family:'Pretendard Variable',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased}
.container{max-width:680px;margin:0 auto;padding:20px}
h1{font-size:1.8rem;font-weight:700;letter-spacing:-.02em}
h2{font-size:1.4rem;font-weight:700;letter-spacing:-.01em}
h3{font-size:1.1rem;font-weight:600}
.card{background:var(--card);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);margin-bottom:20px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 32px;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-secondary{background:var(--bg);color:var(--text);border:1.5px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn:active{transform:scale(.97)}

/* HERO */
.hero{text-align:center;padding:60px 0 30px}
.hero-icon{font-size:4rem;margin-bottom:16px}
.hero h1{margin-bottom:12px}
.hero p{color:var(--sub);font-size:1.05rem;max-width:420px;margin:0 auto 8px}
.hero .ref{font-size:.8rem;color:#999;margin-top:16px}
.features{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:28px 0}
.feature{background:var(--card);border-radius:12px;padding:16px;text-align:center;box-shadow:var(--shadow)}
.feature-icon{font-size:1.5rem;margin-bottom:6px}
.feature-label{font-size:.82rem;color:var(--sub);font-weight:500}

/* PROGRESS */
.progress-bar{width:100%;height:6px;background:var(--border);border-radius:99px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s ease}
.q-counter{text-align:center;font-size:.85rem;color:var(--sub);margin-bottom:16px;font-weight:500}

/* QUESTION */
.question-card{animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.q-text{font-size:1.1rem;font-weight:600;margin-bottom:24px;line-height:1.6}
.likert{display:flex;flex-direction:column;gap:10px}
.likert label{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;font-size:.95rem}
.likert label:hover{border-color:var(--accent);background:rgba(91,106,191,.04)}
.likert input{display:none}
.likert input:checked+.radio-dot{background:var(--accent);border-color:var(--accent)}
.likert input:checked+.radio-dot::after{content:'';width:6px;height:6px;background:#fff;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.likert label:has(input:checked){border-color:var(--accent);background:rgba(91,106,191,.06)}
.radio-dot{width:22px;height:22px;min-width:22px;border:2px solid var(--border);border-radius:50%;position:relative;transition:all .2s}
.likert-label{color:var(--sub);font-size:.85rem}
.nav-btns{display:flex;gap:12px;margin-top:24px}
.nav-btns .btn{flex:1}

/* RESULTS */
.result-header{text-align:center;padding:16px 0}
.type-badge{display:inline-flex;align-items:center;gap:10px;padding:8px 20px;border-radius:99px;font-weight:700;font-size:1.1rem;margin:12px 0}
.type-num{font-size:1.8rem;font-weight:800}
.score-chart{margin:20px 0}
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.score-label{width:90px;font-size:.85rem;font-weight:500;text-align:right;flex-shrink:0}
.score-bar-bg{flex:1;height:24px;background:var(--bg);border-radius:8px;overflow:hidden;position:relative}
.score-bar-fill{height:100%;border-radius:8px;transition:width .8s ease;min-width:2px}
.score-val{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:.75rem;font-weight:600;color:var(--text)}

.section-title{font-size:1rem;font-weight:700;margin:20px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:8px}
.tag{display:inline-block;padding:4px 10px;border-radius:6px;font-size:.78rem;font-weight:600;margin:2px}
.tag-center{background:#EDE7F6;color:#5B6ABF}
.tag-wing{background:#E8F5E9;color:#27AE60}
.tag-growth{background:#E3F2FD;color:#1976D2}
.tag-stress{background:#FCE4EC;color:#C62828}

.detail-grid{display:grid;gap:12px;margin:12px 0}
.detail-item{background:var(--bg);border-radius:12px;padding:16px}
.detail-item h4{font-size:.9rem;font-weight:600;margin-bottom:6px}
.detail-item p{font-size:.88rem;color:var(--sub);line-height:1.6}
.detail-item ul{padding-left:16px;margin-top:6px}
.detail-item li{font-size:.88rem;color:var(--sub);margin-bottom:4px}

.wing-card{display:flex;gap:12px;margin:8px 0}
.wing-card>div{flex:1;background:var(--bg);border-radius:12px;padding:14px}
.wing-card h4{font-size:.85rem;font-weight:600;margin-bottom:4px}
.wing-card p{font-size:.82rem;color:var(--sub);line-height:1.5}

.arrow-diagram{display:flex;align-items:center;justify-content:center;gap:16px;margin:16px 0;padding:20px;background:var(--bg);border-radius:12px}
.arrow-box{text-align:center;padding:12px 16px;border-radius:10px;font-weight:600;font-size:.9rem}
.arrow-icon{font-size:1.5rem;color:var(--sub)}

.save-area{text-align:center;margin:24px 0;display:flex;flex-wrap:wrap;gap:10px;justify-content:center}

.ref-section{background:var(--bg);border-radius:12px;padding:16px;margin-top:16px}
.ref-section h4{font-size:.85rem;font-weight:600;margin-bottom:8px}
.ref-section p{font-size:.78rem;color:var(--sub);line-height:1.5;margin-bottom:4px}

.hidden{display:none!important}

/* IMAGE AREA */
.type-image{width:100%;max-width:320px;margin:16px auto;display:block;border-radius:16px;box-shadow:var(--shadow)}

/* RESPONSIVE */
@media(max-width:500px){
  .container{padding:12px}
  .card{padding:20px}
  h1{font-size:1.5rem}
  .features{grid-template-columns:1fr}
  .wing-card{flex-direction:column}
  .hero{padding:40px 0 20px}
  .arrow-diagram{flex-direction:column;gap:8px}
}

/* PRINT */
@media print{
  body{background:#fff}
  .btn,.save-area,.nav-btns{display:none!important}
  .card{box-shadow:none;border:1px solid #ddd}
}
</style>
<link rel="preconnect" href="https://cdn.jsdelivr.net">

<div class="container" id="app">

<!-- ============ HERO ============ -->

<section id="page-test" class="hidden">

  </div>
</div>
</section>

<!-- ============ RESULT ============ -->
<section id="page-result" class="hidden">
<div id="resultContent"></div>
</section>

</div>

  1:{healthy:'🐜 개미',unhealthy:'🐝 벌',healthyDesc:'근면하고 체계적으로 일하며, 공동체를 위해 헌신합니다. 교사로서 성실하게 수업을 준비하고 원칙을 지킵니다.',unhealthyDesc:'완벽을 향한 집착이 과도해지면 벌처럼 끊임없이 주변을 쏘아붙이고 비판적으로 변할 수 있습니다.'},

const CENTERS = {
  body:{name:'본능(장) 센터',types:[8,9,1],emotion:'분노',desc:'본능 센터에 속하는 유형은 분노와 관련된 감정을 핵심적으로 경험합니다. 신체적 감각과 직관에 의존하며, 자율성과 통제에 대한 욕구가 강합니다. 교사로서 교실의 질서와 공정함을 중시합니다.'},

  {type:7,text:'교실에서 웃음과 긍정적인 에너지를 만드는 것이 학습의 핵심이라 생각합니다.'},
  {type:7,text:'여러 프로젝트나 아이디어를 동시에 진행하는 것이 자연스럽습니다.'},
  // Type 8 - 도전자
  {type:8,text:'불공정한 상황에서는 누구에게든 직접적으로 의견을 말하는 편입니다.'},
  {type:8,text:'학생들이 스스로 문제를 해결하도록 도전적인 과제를 내주는 것을 좋아합니다.'},
  {type:8,text:'교실에서 일어나는 일들을 제가 주도적으로 이끌어가는 것이 편합니다.'},
  // Type 9 - 중재자
  {type:9,text:'학생들 사이에 갈등이 생기면 양쪽 입장을 모두 이해하려고 노력합니다.'},
  {type:9,text:'교실에서 편안하고 조화로운 분위기를 만드는 것을 가장 중요하게 여깁니다.'},
  {type:9,text:'여러 의견이 대립할 때 제 의견을 강하게 주장하기보다 합의점을 찾으려 합니다.'}
];

const LIKERT_OPTIONS = [
  {val:1,label:'전혀 그렇지 않다'},
  {val:2,label:'그렇지 않은 편이다'},
  {val:3,label:'보통이다'},
  {val:4,label:'그런 편이다'},
  {val:5,label:'매우 그렇다'}
];

// ==========================================
// STATE
// ==========================================
let currentQ = 0;
let answers = new Array(QUESTIONS.length).fill(null);

// ==========================================
// FUNCTIONS
// ==========================================
function show(id){
  document.querySelectorAll('#app > section').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
}

function startTest(){
  currentQ = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  show('page-test');
  renderQuestion();
}

function renderQuestion(){
  const q = QUESTIONS[currentQ];
  const pct = ((currentQ)/QUESTIONS.length*100).toFixed(0);
  document.getElementById('progress').style.width = pct+'%';
  document.getElementById('qCounter').textContent = `${currentQ+1} / ${QUESTIONS.length}`;

  let html = `<p class="q-text">${q.text}</p><div class="likert">`;
  LIKERT_OPTIONS.forEach(opt=>{
    const checked = answers[currentQ]===opt.val?'checked':'';
    html += `<label>
      <input type="radio" name="q${currentQ}" value="${opt.val}" ${checked} onchange="selectAnswer(${opt.val})">
      <span class="radio-dot"></span>
      <span>${opt.label}</span>
    </label>`;
  });
  html += '</div>';
  document.getElementById('questionArea').innerHTML = html;

  document.getElementById('btnPrev').style.visibility = currentQ===0?'hidden':'visible';
  const btnNext = document.getElementById('btnNext');
  if(currentQ === QUESTIONS.length-1){
    btnNext.textContent = '결과 보기';
  } else {
    btnNext.textContent = '다음';
  }
}

function selectAnswer(val){
  answers[currentQ] = val;
}

function nextQ(){
  if(answers[currentQ]===null){
    // shake effect
    const card = document.querySelector('.card');
    card.style.animation = 'none';
    card.offsetHeight;
    card.style.animation = 'shake .4s ease';
    return;
  }
  if(currentQ < QUESTIONS.length-1){
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

function prevQ(){
  if(currentQ>0){
    currentQ--;
    renderQuestion();
  }
}

function calcScores(){
  const scores = {};
  for(let t=1;t<=9;t++) scores[t]=0;
  QUESTIONS.forEach((q,i)=>{
    if(answers[i]!==null) scores[q.type] += answers[i];
  });
  // Normalize to 0-100
  const maxPerType = 15; // 3 questions * 5 max
  const normalized = {};
  for(let t=1;t<=9;t++){
    normalized[t] = Math.round((scores[t]/maxPerType)*100);
  }
  return normalized;
}

function getTopType(scores){
  let max=0, type=1;
  for(let t=1;t<=9;t++){
    if(scores[t]>max){max=scores[t];type=t;}
  }
  return type;
}

function getWing(scores, mainType){
  const prev = mainType===1?9:mainType-1;
  const next = mainType===9?1:mainType+1;
  const wing = scores[prev]>=scores[next]?prev:next;
  return wing;
}

function getCenterForType(t){
  if([8,9,1].includes(t)) return 'body';
  if([2,3,4].includes(t)) return 'heart';
  return 'head';
}

function showResult(){
  const scores = calcScores();
  const mainType = getTopType(scores);
  const wing = getWing(scores, mainType);
  const wingKey = `${mainType}w${wing}`;
  const center = getCenterForType(mainType);
  const centerData = CENTERS[center];
  const arrows = ARROWS[mainType];
  const data = TYPE_DATA[mainType];
  const wingData = WINGS[wingKey];

  // Sort types by score
  const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);

  let html = '';

  // Header
  html += `<div class="card result-header">
    <h2>당신의 교사 유형</h2>
    <img src="images/type${mainType}.png" alt="${TYPE_NAMES[mainType]} 교사" class="type-image">
    <div class="type-badge" style="background:${TYPE_COLORS[mainType]}22;color:${TYPE_COLORS[mainType]}">
      <span class="type-num">${mainType}</span>
      <span>${TYPE_NAMES[mainType]} (The ${TYPE_ENG[mainType]})</span>
    </div>
    <p style="color:var(--sub);font-size:.95rem;margin-top:8px">${data.core_motive}</p>
  </div>`;

  // Score chart
  html += `<div class="card"><h3 class="section-title">&#128202; 유형별 점수</h3><div class="score-chart">`;
  sorted.forEach(([t,s])=>{
    const isMain = parseInt(t)===mainType;
    html += `<div class="score-row">
      <span class="score-label" style="${isMain?'font-weight:700;color:'+TYPE_COLORS[t]:''}">
        ${t}. ${TYPE_NAMES[t]}
      </span>
      <div class="score-bar-bg">
        <div class="score-bar-fill" style="width:${s}%;background:${TYPE_COLORS[t]}${isMain?'':'88'}"></div>
        <span class="score-val">${s}%</span>
      </div>
    </div>`;
  });
  html += '</div></div>';

  // Center / Triad
  html += `<div class="card">
    <h3 class="section-title">&#129504; 센터 (트라이어드)</h3>
    <span class="tag tag-center">${centerData.name}</span>
    <span class="tag" style="background:#FFF3E0;color:#E65100">핵심 감정: ${centerData.emotion}</span>
    <p style="margin-top:12px;font-size:.9rem;color:var(--sub);line-height:1.7">${centerData.desc}</p>
  </div>`;

  // Main Type Detail
  html += `<div class="card">
    <h3 class="section-title">&#127793; ${mainType}번 유형: ${TYPE_NAMES[mainType]} 교사</h3>
    <div class="detail-grid">
      <div class="detail-item">
        <h4>&#128155; 핵심 동기</h4>
        <p>${data.core_motive}</p>
      </div>
      <div class="detail-item">
        <h4>&#128560; 핵심 두려움</h4>
        <p>${data.core_fear}</p>
      </div>
      <div class="detail-item">
        <h4>&#127919; 교사로서의 특징</h4>
        <p>${data.teacher_style}</p>
      </div>
      <div class="detail-item">
        <h4>&#127775; 건강한 모습</h4>
        <p>${data.healthy}</p>
      </div>
      <div class="detail-item">
        <h4>&#9888;&#65039; 주의할 모습</h4>
        <p>${data.unhealthy}</p>
      </div>
      <div class="detail-item">
        <h4>&#128170; 교사로서의 강점</h4>
        <ul>${data.strengths.map(s=>`<li>${s}</li>`).join('')}</ul>
      </div>
    </div>
  </div>`;

  // 상징 동물
  const animal = TYPE_ANIMALS[mainType];
  html += `<div class="card">
    <h3 class="section-title">&#128062; 상징 동물</h3>
    <p style="font-size:.82rem;color:var(--sub);margin-bottom:14px">출처: Richard Rohr &amp; Andreas Ebert, <em>The Enneagram: A Christian Perspective</em> (2001)</p>
    <div class="detail-grid">
      <div class="detail-item" style="border-left:3px solid ${TYPE_COLORS[mainType]}">
        <h4>&#127775; 건강할 때 — ${animal.healthy}</h4>
        <p>${animal.healthyDesc}</p>
      </div>
      <div class="detail-item" style="border-left:3px solid #E57373">
        <h4>&#9888;&#65039; 주의할 때 — ${animal.unhealthy}</h4>
        <p>${animal.unhealthyDesc}</p>
      </div>
    </div>
  </div>`;

  // Wing
  html += `<div class="card">
    <h3 class="section-title">&#129657; 날개 (Wing)</h3>
    <p style="font-size:.88rem;color:var(--sub);margin-bottom:12px">날개는 주유형에 영향을 주는 인접 유형으로, 당신의 성격에 독특한 색채를 더합니다.</p>
    <span class="tag tag-wing">${wingData.name}</span>
    <div class="wing-card">
      <div>
        <h4>${mainType}w${mainType===1?9:mainType-1}</h4>
        <p>${WINGS[`${mainType}w${mainType===1?9:mainType-1}`].desc}</p>
      </div>
      <div>
        <h4>${mainType}w${mainType===9?1:mainType+1}</h4>
        <p>${WINGS[`${mainType}w${mainType===9?1:mainType+1}`].desc}</p>
      </div>
    </div>
    <p style="margin-top:12px;font-size:.88rem"><b>당신의 날개:</b> ${wingData.desc}</p>
  </div>`;

  // Integration / Disintegration
  html += `<div class="card">
    <h3 class="section-title">&#128260; 성장과 스트레스 방향</h3>
    <p style="font-size:.88rem;color:var(--sub);margin-bottom:12px">
      애니어그램의 화살표는 각 유형이 성장(통합)과 스트레스(분열) 시 어떤 유형의 특성을 보이는지를 나타냅니다.
      <br><small>(Riso & Hudson, <i>The Wisdom of the Enneagram</i>, 2000)</small>
    </p>
    <div class="arrow-diagram">
      <div class="arrow-box" style="background:#E3F2FD;color:#1565C0">
        <small>성장 방향</small><br>
        <b>${arrows.growth}번 ${TYPE_NAMES[arrows.growth]}</b>
      </div>
      <div class="arrow-icon">&#8592;</div>
      <div class="arrow-box" style="background:${TYPE_COLORS[mainType]}22;color:${TYPE_COLORS[mainType]}">
        <small>나의 유형</small><br>
        <b>${mainType}번 ${TYPE_NAMES[mainType]}</b>
      </div>
      <div class="arrow-icon">&#8594;</div>
      <div class="arrow-box" style="background:#FCE4EC;color:#C62828">
        <small>스트레스 방향</small><br>
        <b>${arrows.stress}번 ${TYPE_NAMES[arrows.stress]}</b>
      </div>
    </div>
    <div class="detail-grid" style="grid-template-columns:1fr 1fr">
      <div class="detail-item" style="border-left:3px solid #1976D2">
        <h4>&#127793; 성장 시 (&#8594; ${arrows.growth}번)</h4>
        <p>건강하게 성장할 때 ${arrows.growth}번 ${TYPE_NAMES[arrows.growth]} 유형의 긍정적 특성이 나타납니다. ${TYPE_DATA[arrows.growth].healthy.split('.')[0]}.</p>
      </div>
      <div class="detail-item" style="border-left:3px solid #C62828">
        <h4>&#9888;&#65039; 스트레스 시 (&#8594; ${arrows.stress}번)</h4>
        <p>스트레스를 받을 때 ${arrows.stress}번 ${TYPE_NAMES[arrows.stress]} 유형의 부정적 특성이 나타날 수 있습니다. ${TYPE_DATA[arrows.stress].unhealthy.split('.')[0]}.</p>
      </div>
    </div>
  </div>`;

  // Growth tips
  html += `<div class="card">
    <h3 class="section-title">&#127807; 교사로서의 성장 팁</h3>
    <div class="detail-grid">
      ${data.growth_tips.map(tip=>`<div class="detail-item"><p>${tip}</p></div>`).join('')}
    </div>
  </div>`;

  // All 9 types overview
  html += `<div class="card">
    <h3 class="section-title">&#128214; 9가지 유형 한눈에 보기</h3>
    <div class="detail-grid">`;
  for(let t=1;t<=9;t++){
    const isMe = t===mainType;
    html += `<div class="detail-item" style="${isMe?'border:2px solid '+TYPE_COLORS[t]+';background:'+TYPE_COLORS[t]+'08':''}">
      <h4 style="color:${TYPE_COLORS[t]}">${t}. ${TYPE_NAMES[t]} (${TYPE_ENG[t]}) ${isMe?'&#11088; 나의 유형':''}</h4>
      <p><b>동기:</b> ${TYPE_DATA[t].core_motive}</p>
      <p><b>교사 스타일:</b> ${TYPE_DATA[t].teacher_style.substring(0,60)}...</p>
      <p style="font-size:.8rem;margin-top:4px">
        <span class="tag tag-growth">성장&#8594;${ARROWS[t].growth}번</span>
        <span class="tag tag-stress">스트레스&#8594;${ARROWS[t].stress}번</span>
      </p>
    </div>`;
  }
  html += '</div></div>';

  // References
  html += `<div class="card">
    <h3 class="section-title">&#128218; 참고 문헌</h3>
    <div class="ref-section">
      <p>Riso, D. R., & Hudson, R. (2000). <i>The Wisdom of the Enneagram</i>. Bantam Books.</p>
      <p>Riso, D. R., & Hudson, R. (1999). <i>Personality Types: Using the Enneagram for Self-Discovery</i>. Houghton Mifflin.</p>
      <p>Palmer, H. (1991). <i>The Enneagram: Understanding Yourself and the Others in Your Life</i>. Harper One.</p>
      <p>Naranjo, C. (1994). <i>Character and Neurosis: An Integrative View</i>. Gateways Books.</p>
      <p>Hook, J. N., et al. (2021). The Enneagram: A systematic review of the literature. <i>Journal of Clinical Psychology</i>.</p>
      <p>Daniels, D., & Price, V. (2009). <i>The Essential Enneagram</i>. Harper One.</p>
      <p>Roh, H., et al. Understanding medical students' empathy based on Enneagram personality types. <i>Korean Journal of Medical Education</i>.</p>
      <p>Hur, Y., & Lee, K. (2011). Analysis of students' enneagram personality types, stress, and developmental level. <i>Korean Journal of Medical Education</i>.</p>
    </div>
    <p style="font-size:.78rem;color:#999;margin-top:12px;text-align:center">
      본 테스트는 Riso-Hudson Enneagram Type Indicator(RHETI) 및 공인 학술 자료를 참고하여 교사 맥락에 맞게 재구성한 것입니다.<br>
      정확한 애니어그램 유형 확인을 위해서는 공인 전문가의 상담을 권장합니다.
    </p>
  </div>`;

  // Save area
  html += `<div class="save-area">
    <button class="btn btn-primary" onclick="saveAsImage()">&#128247; 이미지로 저장</button>
    <button class="btn btn-secondary" onclick="window.print()">&#128424; 인쇄 / PDF 저장</button>
    <button class="btn btn-secondary" onclick="copyResult()">&#128203; 텍스트 복사</button>
    <button class="btn btn-secondary" onclick="startTest()">&#128260; 다시 테스트</button>
  </div>`;

  html += `<div style="margin-top:20px;padding:12px 16px;background:#FFF3E0;border:1px solid #FFB74D;border-radius:10px;font-size:.78rem;color:#E65100;line-height:1.6;text-align:center">
    ⚠️ 본 테스트는 <strong>전문 심리검사가 아니며</strong>, 재미와 자기성찰 목적으로 제작되었습니다.<br>정확한 유형 판별을 위해서는 공인 전문가의 해석이 필요합니다.
  </div>`;

  document.getElementById('resultContent').innerHTML = html;
  show('page-result');

  // Animate bars
  setTimeout(()=>{
    document.querySelectorAll('.score-bar-fill').forEach(bar=>{
      bar.style.width = bar.style.width;
    });
  },100);
}

function saveAsImage(){
  const el = document.getElementById('page-result');
  // Use html2canvas if available, otherwise fallback
  if(typeof html2canvas !== 'undefined'){
    html2canvas(el,{
      backgroundColor:'#faf9f7',
      scale:2,
      useCORS:true,
      logging:false
    }).then(canvas=>{
      const link = document.createElement('a');
      link.download = `교사_애니어그램_결과_${new Date().toLocaleDateString('ko')}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  } else {
    // Load html2canvas dynamically
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
    script.onload = ()=>saveAsImage();
    document.head.appendChild(script);
  }
}

function copyResult(){
  const scores = calcScores();
  const mainType = getTopType(scores);
  const wing = getWing(scores, mainType);
  const data = TYPE_DATA[mainType];
  const arrows = ARROWS[mainType];

  let text = `[교사 애니어그램 테스트 결과]\n\n`;
  text += `유형: ${mainType}번 ${TYPE_NAMES[mainType]} (The ${TYPE_ENG[mainType]})\n`;
  text += `날개: ${mainType}w${wing}\n`;
  text += `센터: ${CENTERS[getCenterForType(mainType)].name}\n\n`;
  text += `핵심 동기: ${data.core_motive}\n`;
  text += `핵심 두려움: ${data.core_fear}\n\n`;
  text += `교사 스타일: ${data.teacher_style}\n\n`;
  text += `성장 방향: ${arrows.growth}번 ${TYPE_NAMES[arrows.growth]}\n`;
  text += `스트레스 방향: ${arrows.stress}번 ${TYPE_NAMES[arrows.stress]}\n\n`;
  text += `유형별 점수:\n`;
  Object.entries(scores).sort((a,b)=>b[1]-a[1]).forEach(([t,s])=>{
    text += `  ${t}. ${TYPE_NAMES[t]}: ${s}%\n`;
  });

  navigator.clipboard.writeText(text).then(()=>{
    const btn = event.target;
    btn.textContent = '복사됨!';
    setTimeout(()=>btn.innerHTML = '&#128203; 텍스트 복사',1500);
  });
}

// Shake animation
const style = document.createElement('style');
style.textContent = '@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}';
document.head.appendChild(style);
</script>
</body>
</html>
